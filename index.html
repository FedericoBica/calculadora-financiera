<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Descuento de Cheques</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #222222;
    --border: #2e2e2e;
    --accent: #f0c040;
    --accent2: #e05a2b;
    --text: #f0ede8;
    --muted: #888;
    --green: #4caf82;
    --red: #e05a2b;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background-image: radial-gradient(circle at 20% 20%, #1e1500 0%, transparent 50%),
                      radial-gradient(circle at 80% 80%, #1a0a00 0%, transparent 50%);
  }

  .card {
    width: 100%;
    max-width: 480px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 32px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.03);
  }

  .header {
    padding: 28px 21px 22px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(135deg, #1e1e1e, #161616);
    position: relative;
  }

  .header-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.18em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .header h1 {
    font-size: 20px;
    font-weight: 800;
    line-height: 1.1;
    letter-spacing: -0.02em;
  }

  .body {
    padding: 28px 32px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 7px;
  }

  label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .input-wrap { position: relative; }

  .prefix {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    color: var(--muted);
    pointer-events: none;
  }

  input[type="number"] {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 13px 14px 13px 28px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 18px;
    font-weight: 500;
    outline: none;
    transition: border-color 0.2s;
  }

  input[type="number"]:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(240,192,64,0.12);
  }

  .no-prefix { padding-left: 14px !important; }

  .suffix {
    position: absolute;
    right: 14px;
    top: 50%; 
    transform: translateY(-50%);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
  }

  .row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }

  .btn {
    background: var(--accent);
    color: #0f0f0f;
    border: none;
    border-radius: 12px;
    padding: 15px;
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 800;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn:hover {
    background: #f7d060;
    transform: translateY(-1px);
  }

  .btn-secondary {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
    margin-top: -10px;
    font-size: 11px;
    padding: 8px;
  }

  .result-section {
    background: #111;
    border-top: 1px solid var(--border);
    padding: 24px 32px 28px;
  }

  .result-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 18px;
  }

  .result-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
  }

  .result-item-label {
    font-size: 9px;
    font-weight: 700;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 4px;
  }

  .result-item-value {
    font-family: 'DM Mono', monospace;
    font-size: 15px;
    color: var(--text);
  }

  .pos { color: var(--green); }
  .neg { color: var(--red); }

  .result-main {
    background: linear-gradient(135deg, #1c1700, #1a1200);
    border: 1px solid rgba(240,192,64,0.25);
    border-radius: 12px;
    padding: 16px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .result-main-value {
    font-family: 'DM Mono', monospace;
    font-size: 24px;
    color: var(--accent);
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div class="card">
  <div class="header">
    <h1>DescuentaCheques</h1>
  </div>

  <div class="body">
    <div class="field">
      <label>Monto del cheque</label>
      <div class="input-wrap">
        <span class="prefix">$</span>
        <input type="number" id="monto" value="169290.86" step="0.01">
      </div>
    </div>

    <div class="row">
      <div class="field">
        <label>Días</label>
        <div class="input-wrap">
          <input type="number" id="dias" value="90" class="no-prefix">
          <span class="suffix">días</span>
        </div>
      </div>
      <div class="field">
        <label>Tasa mensual</label>
        <div class="input-wrap">
          <input type="number" id="tasa" value="3.9" step="0.01" class="no-prefix">
          <span class="suffix">%</span>
        </div>
      </div>
    </div>

    <button class="btn" onclick="calcular()">Calcular</button>
    <button class="btn btn-secondary" id="btn-toggle" onclick="toggleDetalle()">Ocultar desglose</button>
  </div>

  <div class="result-section" id="resultado">
    <div class="result-grid" id="r-grid">
      <div class="result-item">
        <div class="result-item-label">Descuento</div>
        <div class="result-item-value neg" id="r-intereses">—</div>
      </div>
      <div class="result-item">
        <div class="result-item-label">Tasa Diaria</div>
        <div class="result-item-value" id="r-tasa-diaria">—</div>
      </div>
      <div class="result-item">
        <div class="result-item-label">Rendimiento </div>
        <div class="result-item-value pos" id="r-rendimiento">—</div>
      </div>
      <div class="result-item">
        <div class="result-item-label">TEA</div>
        <div class="result-item-value pos" id="r-tea">—</div>
      </div>
    </div>
    <div class="result-main">
      <div style="font-size: 13px; font-weight: 700; color: var(--accent);">A RECIBIR</div>
      <div class="result-main-value" id="r-neto">—</div>
    </div>
  </div>
</div>

<script>
function fmt(n) {
  return n.toLocaleString('es-AR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function toggleDetalle() {
  const grid = document.getElementById('r-grid');
  const btn = document.getElementById('btn-toggle');
  const isHidden = grid.style.display === 'none';
  grid.style.display = isHidden ? 'grid' : 'none';
  btn.textContent = isHidden ? 'Ocultar desglose' : 'Ver desglose';
}

function calcular() {
  const monto = parseFloat(document.getElementById('monto').value) || 0;
  const dias = parseFloat(document.getElementById('dias').value) || 0;
  const tasaMensual = parseFloat(document.getElementById('tasa').value) || 0;

  // Tasa diaria compuesta
  const tasaDiaria = Math.pow(1 + (tasaMensual / 100), 1 / 30) - 1;

// Ejecutar al cargar
window.onload = calcular;
</script>

</body>
</html>
