<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DescuentaCheques</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #222222;
    --border: #2e2e2e;
    --accent: #f0c040;
    --accent2: #e05a2b;
    --text: #f0ede8;
    --muted: #888;
    --green: #4caf82;
    --red: #e05a2b;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background-image: radial-gradient(circle at 20% 20%, #1e1500 0%, transparent 50%),
                      radial-gradient(circle at 80% 80%, #1a0a00 0%, transparent 50%);
  }

  .card {
    width: 100%;
    max-width: 480px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 32px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.03);
  }

  .header {
    padding: 28px 32px 22px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(135deg, #1e1e1e, #161616);
    position: relative;
    overflow: hidden;
  }

  .header::before {
    content: '';
    position: absolute;
    top: -30px; right: -30px;
    width: 100px; height: 100px;
    background: var(--accent);
    opacity: 0.06;
    border-radius: 50%;
  }

  .header-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.18em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .header h1 {
    font-size: 24px;
    font-weight: 800;
    line-height: 1.1;
    letter-spacing: -0.02em;
  }

  .body {
    padding: 28px 32px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 7px;
  }

  label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .input-wrap {
    position: relative;
  }

  .prefix {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    color: var(--muted);
    pointer-events: none;
  }

  input[type="number"] {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 13px 14px 13px 28px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 18px;
    font-weight: 500;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    -moz-appearance: textfield;
  }

  input[type="number"]::-webkit-inner-spin-button,
  input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }

  input[type="number"]:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(240,192,64,0.12);
  }

  input[type="number"].no-prefix {
    padding-left: 14px;
  }

  .suffix {
    position: absolute;
    right: 14px;
    top: 50%; transform: translateY(-50%);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
  }

  .row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }

  .btn {
    background: var(--accent);
    color: #0f0f0f;
    border: none;
    border-radius: 12px;
    padding: 15px;
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 800;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s, background 0.15s;
    margin-top: 4px;
  }

  .btn:hover {
    background: #f7d060;
    box-shadow: 0 8px 24px rgba(240,192,64,0.3);
    transform: translateY(-1px);
  }

  .btn:active { transform: translateY(0); }

  .result-section {
    background: #111;
    border-top: 1px solid var(--border);
    padding: 24px 32px 28px;
  }

  .result-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 16px;
  }

  .result-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 18px;
  }

  .result-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
  }

  .result-item-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 4px;
  }

  .result-item-value {
    font-family: 'DM Mono', monospace;
    font-size: 16px;
    font-weight: 500;
    color: var(--text);
  }

  .result-item-value.neg { color: var(--red); }
  .result-item-value.pos { color: var(--green); }

  .result-main {
    background: linear-gradient(135deg, #1c1700, #1a1200);
    border: 1px solid rgba(240,192,64,0.25);
    border-radius: 12px;
    padding: 16px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .result-main-label {
    font-size: 13px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.05em;
  }

  .result-main-value {
    font-family: 'DM Mono', monospace;
    font-size: 26px;
    font-weight: 500;
    color: var(--accent);
    letter-spacing: -0.02em;
  }

  .hidden { display: none; }

  .divider {
    height: 1px;
    background: var(--border);
    margin: 2px 0 6px;
  }

  @media (max-width: 400px) {
    .body, .result-section { padding-left: 20px; padding-right: 20px; }
    .header { padding: 22px 20px 18px; }
    .result-main-value { font-size: 22px; }
  }
</style>
</head>
<body>

<div class="card">
  <div class="header">
    <h1>DescuentaCheques</h1>
  </div>

  <div class="body">
    <div class="field">
      <label>Monto del cheque</label>
      <div class="input-wrap">
        <span class="prefix">$</span>
        <input type="number" id="monto" value="169290.86" step="0.01" min="0">
      </div>
    </div>

    <div class="row">
      <div class="field">
        <label>Días</label>
        <div class="input-wrap">
          <input type="number" id="dias" value="90" step="1" min="1" class="no-prefix">
          <span class="suffix">días</span>
        </div>
      </div>
      <div class="field">
        <label>Tasa mensual</label>
        <div class="input-wrap">
          <input type="number" id="tasa" value="3.9" step="0.01" min="0" class="no-prefix">
          <span class="suffix">% / mes</span>
        </div>
      </div>
    </div>
    <button class="btn" onclick="calcular()">Calcular</button>
  </div>
</div>

<script>
function fmt(n) {
  return n.toLocaleString('es-AR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function calcular() {
  const monto  = parseFloat(document.getElementById('monto').value) || 0;
  const dias   = parseFloat(document.getElementById('dias').value)  || 0;
  const tasa   = parseFloat(document.getElementById('tasa').value)  || 0;
  const gastos = parseFloat(document.getElementById('gastos').value) || 0;

  // Tasa diaria equivalente: (1 + tasa_mensual/100)^(1/30) - 1
  const tasaDiaria = Math.pow(1 + tasa / 100, 1 / 30) - 1;

  // Descuento comercial: D = M * i_diaria * dias
  const intereses = monto * tasaDiaria * dias;
  const totalDesc = intereses + gastos;
  const neto = monto - totalDesc;

  const sec = document.getElementById('resultado');
  sec.style.display = 'block';
  sec.style.animation = 'none';
  sec.offsetHeight; // reflow
  sec.style.animation = 'fadeIn 0.35s ease';
}

// Auto-calc on load
window.addEventListener('load', calcular);
</script>

<style>
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}
</style>

</body>
</html>
